name: Drop an MCP server, get a receipt
description: Request a safe, reproducible MCP Observatory receipt for one server your agent depends on.
title: "[Receipt request] "
labels: ["tool-call-receipt", "target-registry", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Drop one public MCP server/package and MCP Observatory will try to turn it into a safe, reproducible receipt.

        A normal receipt answers: what happened in this run?
        A delta receipt answers: what changed since the last trusted run?

        Good requests can become Safety Index entries, attack-sim evidence, SARIF artifacts, maintainer CI conversations, or starter PRs.

        Please do not paste secrets, private telemetry, private URLs, customer data, or destructive commands.
  - type: input
    id: server
    attributes:
      label: MCP server
      description: Link to the public repo, package, docs, or directory listing.
      placeholder: https://github.com/example/example-mcp
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Safe startup command
      description: Command Observatory can run without secrets, writes, destructive side effects, or production access.
      placeholder: npx -y example-mcp
    validations:
      required: true
  - type: dropdown
    id: secrets
    attributes:
      label: Does it require secrets?
      options:
        - "No"
        - "Optional"
        - "Yes"
        - "Unknown"
    validations:
      required: true
  - type: textarea
    id: agent_use
    attributes:
      label: Which agent or workflow depends on it?
      description: Explain the agent workflow this MCP server supports.
      placeholder: My coding agent uses this to search docs, browse pages, read files, query a database, etc.
    validations:
      required: true
  - type: checkboxes
    id: risks
    attributes:
      label: What risks should the receipt check?
      options:
        - label: Tool poisoning or suspicious instructions
        - label: Schema drift or changed tool surface
        - label: Broad filesystem access
        - label: Browser, network, or command execution boundary
        - label: Credential or canary exposure
        - label: Startup/listing reproducibility
        - label: CI/SARIF adoption
  - type: textarea
    id: safety_notes
    attributes:
      label: Safety notes
      description: Mention safe fixtures, harmless modes, risky tools, or commands to avoid.
      placeholder: This can run with no secrets. Use a fixture directory. Do not invoke...
  - type: textarea
    id: desired_output
    attributes:
      label: Desired output
      description: What would be useful to receive?
      placeholder: Safety Index entry, attack-sim report, delta receipt, SARIF artifact, setup-ci PR, private review, etc.
