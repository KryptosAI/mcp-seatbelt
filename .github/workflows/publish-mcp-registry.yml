name: Publish to MCP Registry

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download mcp-publisher
        run: |
          curl -L -o /tmp/mcp-publisher.tar.gz https://github.com/modelcontextprotocol/registry/releases/download/v1.8.0/mcp-publisher_linux_amd64.tar.gz
          tar -xzf /tmp/mcp-publisher.tar.gz -C /tmp
          chmod +x /tmp/mcp-publisher

      - name: Authenticate with GitHub OIDC
        run: /tmp/mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: /tmp/mcp-publisher publish
