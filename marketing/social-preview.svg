<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#111827;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e17;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.15" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)" />

  <!-- Accent glow bar (top) -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGradient)" />

  <!-- Accent glow area behind text -->
  <ellipse cx="600" cy="280" rx="500" ry="200" fill="url(#accentGlow)" />

  <!-- Shield icon (abstract) -->
  <g transform="translate(540, 145)" opacity="0.85">
    <path d="M60 0 L120 0 L120 45 C120 90 60 120 60 120 C60 120 0 90 0 45 L0 0 L60 0 Z"
          fill="none" stroke="url(#accentGradient)" stroke-width="3" stroke-linejoin="round" />
    <path d="M45 45 L55 58 L78 35" fill="none" stroke="#10b981" stroke-width="4"
          stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Title -->
  <text x="600" y="330" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="52" font-weight="bold" fill="#f8fafc" text-anchor="middle" letter-spacing="2">
    MCP Security Platform
  </text>

  <!-- Subtitle -->
  <text x="600" y="385" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="400" fill="#94a3b8" text-anchor="middle" letter-spacing="1">
    Scan Before You Trust. Enforce at Runtime.
  </text>

  <!-- Divider line -->
  <line x1="450" y1="435" x2="750" y2="435" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.6" />

  <!-- Bottom text -->
  <text x="600" y="510" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="22" font-weight="500" fill="#64748b" text-anchor="middle" letter-spacing="1.5">
    github.com/KryptosAI
  </text>

  <!-- Bottom subtle bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentGradient)" opacity="0.5" />
</svg>
